# Production compose — run on the EC2 host:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Differences vs the dev docker-compose.yml:
#   - NO `db` service: Postgres is managed by AWS RDS. The API reaches it via
#     POSTGRES_HOST (the RDS endpoint), set in the server's .env.
#   - NO bind mounts / --reload: the image is self-contained (code is COPYed in at
#     build time, not live-mounted), as it should be on a server.
#   - restart: unless-stopped: the app comes back automatically after a reboot.
#   - Only the web port is published to the host; Nginx (on the host) terminates
#     HTTPS and proxies to it. The api is reachable to web over the compose network.

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env                # on the server, .env points POSTGRES_HOST at RDS
    environment:
      PYTHONPATH: /app
    expose:
      - "8000"                    # visible to other compose services, not published to host
    restart: unless-stopped
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    env_file: .env
    environment:
      API_URL: http://api:8000    # reach the api over the compose network
    ports:
      - "127.0.0.1:8501:8501"     # bind to localhost only; Nginx proxies the public traffic
    restart: unless-stopped
    depends_on:
      - api
    command: streamlit run services/web/app.py --server.port 8501 --server.address 0.0.0.0
