name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        # Install api + ingest extras so tests can import everything they touch.
        # The dep split (commit aaac945) moved fastapi/llama-index/openai out of
        # the base; CI needs them back to import services.api.* and ingest.*.
        run: pip install ".[api,ingest,dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest
