# Seed corpus for ChestRAG (Weekend 1) — the data-driven input to ingest/fetch.py.
# Every entry has a freely downloadable PDF (arXiv / open-access). IDs verified via web search.
#
# Schema per paper:
#   id        short slug (used as the local filename: data/raw/<id>.pdf)
#   title     paper title
#   authors   short author string
#   year      publication year
#   category  dataset | classifier | vision-language | zero-shot | foundation |
#             report-generation | fairness | clinical-validation
#   source    arxiv | cvf | pmc
#   arxiv_id  arXiv identifier (null for non-arXiv sources)
#   pdf_url   direct URL fetch.py downloads
#   note      (optional) caveat for fetch.py / manual fallback

papers:
  # --- Datasets & benchmarks ---
  - id: chestxray8
    title: "ChestX-ray8: Hospital-scale Chest X-ray Database and Benchmarks on Weakly-Supervised Classification and Localization of Common Thorax Diseases"
    authors: "Wang et al."
    year: 2017
    category: dataset
    source: arxiv
    arxiv_id: "1705.02315"
    pdf_url: "https://arxiv.org/pdf/1705.02315"

  - id: chexpert
    title: "CheXpert: A Large Chest Radiograph Dataset with Uncertainty Labels and Expert Comparison"
    authors: "Irvin et al."
    year: 2019
    category: dataset
    source: arxiv
    arxiv_id: "1901.07031"
    pdf_url: "https://arxiv.org/pdf/1901.07031"

  - id: mimic-cxr
    title: "MIMIC-CXR-JPG, a large publicly available database of labeled chest radiographs"
    authors: "Johnson et al."
    year: 2019
    category: dataset
    source: arxiv
    arxiv_id: "1901.07042"
    pdf_url: "https://arxiv.org/pdf/1901.07042"
    note: "arXiv MIMIC-CXR-JPG companion paper (clean PDF) in place of the Nature Sci Data database paper."

  - id: padchest
    title: "PadChest: A large chest x-ray image dataset with multi-label annotated reports"
    authors: "Bustos et al."
    year: 2019
    category: dataset
    source: arxiv
    arxiv_id: "1901.07441"
    pdf_url: "https://arxiv.org/pdf/1901.07441"

  - id: vindr-cxr
    title: "VinDr-CXR: An open dataset of chest X-rays with radiologist's annotations"
    authors: "Nguyen et al."
    year: 2022
    category: dataset
    source: arxiv
    arxiv_id: "2012.15029"
    pdf_url: "https://arxiv.org/pdf/2012.15029"

  # --- CNN classifier / clinical baseline ---
  - id: chexnet
    title: "CheXNet: Radiologist-Level Pneumonia Detection on Chest X-Rays with Deep Learning"
    authors: "Rajpurkar et al."
    year: 2017
    category: classifier
    source: arxiv
    arxiv_id: "1711.05225"
    pdf_url: "https://arxiv.org/pdf/1711.05225"

  # --- Vision-language pretraining ---
  - id: convirt
